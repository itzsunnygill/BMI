<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium BMI Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <div class="calculator-card">
            <header>
                <h1>BMI Calculator</h1>
                <p>Check your body mass index</p>
            </header>
            
            <form id="bmi-form">
                <div class="gender-selection">
                    <label class="gender-option">
                        <input type="radio" name="gender" value="male" id="male">
                        <div class="gender-card">
                            <span class="icon">👨</span>
                            <span>Male</span>
                        </div>
                    </label>
                    <label class="gender-option">
                        <input type="radio" name="gender" value="female" id="female">
                        <div class="gender-card">
                            <span class="icon">👩</span>
                            <span>Female</span>
                        </div>
                    </label>
                </div>

                <div class="input-group">
                    <div class="input-field">
                        <label for="age">Age</label>
                        <input type="number" id="age" placeholder="2-120" min="2" max="120" required>
                    </div>
                    <div class="input-field">
                        <label for="height">Height (cm)</label>
                        <input type="number" id="height" placeholder="e.g. 175" min="50" max="300" required>
                    </div>
                    <div class="input-field">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" placeholder="e.g. 70" min="10" max="500" required>
                    </div>
                </div>

                <button type="submit" id="calculate-btn">Calculate BMI</button>
            </form>

            <div class="result-container hidden" id="result-container">
                <div class="result-number" id="result-value">24.5</div>
                <div class="result-category" id="result-category">Normal Weight</div>
                <div class="result-message" id="result-message">You have a healthy body weight.</div>
                <div class="bmi-scale">
                    <div class="scale-bar">
                        <div class="indicator" id="scale-indicator"></div>
                    </div>
                    <div class="scale-labels">
                        <span>18.5</span>
                        <span>25</span>
                        <span>30</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
